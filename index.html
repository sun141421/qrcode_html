<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code 生成器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            width: 100%;
            max-width: 480px;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 24px;
            font-size: 24px;
        }
        .input-group {
            margin-bottom: 18px;
        }
        label {
            display: block;
            font-weight: 600;
            color: #555;
            margin-bottom: 6px;
            font-size: 14px;
        }
        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            resize: vertical;
            min-height: 80px;
            transition: border-color 0.2s;
            font-family: inherit;
        }
        textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        .row {
            display: flex;
            gap: 12px;
        }
        .row .input-group { flex: 1; }
        select, input[type="color"] {
            width: 100%;
            padding: 10px 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            background: white;
            cursor: pointer;
        }
        select:focus, input[type="color"]:focus {
            outline: none;
            border-color: #667eea;
        }
        input[type="color"] {
            height: 42px;
            padding: 4px;
        }
        .color-row {
            display: flex;
            gap: 12px;
        }
        .color-item { flex: 1; }
        .color-item label {
            font-size: 12px;
            color: #888;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 24px;
        }
        button {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-secondary {
            background: #f0f0f0;
            color: #555;
        }
        .btn-secondary:hover { background: #e0e0e0; }
        .qr-output {
            margin-top: 28px;
            text-align: center;
            display: none;
        }
        .qr-output.show { display: block; }
        #qrbox {
            display: inline-block;
            padding: 8px;
            background: white;
            border: 2px solid #f0f0f0;
            border-radius: 12px;
        }
        #qrbox canvas, #qrbox img {
            display: block;
            border-radius: 4px;
        }
        .hint {
            text-align: center;
            color: #999;
            font-size: 13px;
            margin-top: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📱 QR Code 生成器</h1>

        <div class="input-group">
            <label for="content">输入内容</label>
            <textarea id="content" placeholder="请输入文本、URL 或任何内容…" autofocus>https://github.com</textarea>
        </div>

        <div class="row">
            <div class="input-group">
                <label for="size">尺寸</label>
                <select id="size">
                    <option value="200">200 × 200</option>
                    <option value="300" selected>300 × 300</option>
                    <option value="400">400 × 400</option>
                    <option value="500">500 × 500</option>
                </select>
            </div>
            <div class="input-group">
                <label for="ecc">纠错级别</label>
                <select id="ecc">
                    <option value="L">L - 低 (7%)</option>
                    <option value="M" selected>M - 中 (15%)</option>
                    <option value="Q">Q - 较高 (25%)</option>
                    <option value="H">H - 高 (30%)</option>
                </select>
            </div>
        </div>

        <div class="color-row">
            <div class="color-item input-group">
                <label for="fg">前景色</label>
                <input type="color" id="fg" value="#000000">
            </div>
            <div class="color-item input-group">
                <label for="bg">背景色</label>
                <input type="color" id="bg" value="#ffffff">
            </div>
        </div>

        <div class="btn-group">
            <button class="btn-primary" onclick="generate()">生成二维码</button>
            <button class="btn-secondary" onclick="download()">下载 PNG</button>
        </div>

        <div class="qr-output" id="output">
            <div id="qrbox"></div>
            <p class="hint">右键二维码可保存，或点击"下载 PNG"</p>
        </div>
    </div>

<script>
/**
 * QR Code Generator — 纯前端，零外部依赖
 * 基于 ISO/IEC 18004 标准从头实现的 QR 码编码器
 * 支持: UTF-8 中文、版本 1-40、4 种纠错级别
 */
const QR = (() => {
    'use strict';

    // ---- GF(256) 表 ----
    const EXP = new Uint8Array(256), LOG = new Uint8Array(256);
    for (let i = 0, x = 1; i < 255; i++) { EXP[i] = x; LOG[x] = i; x = x << 1 ^ (x >> 7) * 0x11D; }

    function gfMul(a, b) { return a && b ? EXP[(LOG[a] + LOG[b]) % 255] : 0; }

    // ---- RS ----
    function rsGenPoly(deg) {
        let g = [1];
        for (let i = 0; i < deg; i++) {
            const ng = new Uint8Array(g.length + 1);
            for (let j = 0; j < g.length; j++) {
                ng[j] ^= g[j];
                ng[j + 1] ^= gfMul(g[j], EXP[i]);
            }
            g = ng;
        }
        return g;
    }

    function rsEncode(data, deg) {
        const gen = rsGenPoly(deg);
        const res = new Uint8Array(data.length + deg);
        res.set(data);
        for (let i = 0; i < data.length; i++) {
            const c = res[i];
            if (c) for (let j = 0; j < gen.length; j++) res[i + j] ^= gfMul(gen[j], c);
        }
        return res.slice(data.length);
    }

    // ---- 容量表（每种 ECC 的块数量和数据码字数） ----
    // ECC_SPEC[ver] = [ [n1,d1,n2,d2] for L,M,Q,H ]
    const ECC_SPEC = [
        null,
        [[1,19],[1,16],[1,13],[1,9]],
        [[1,34],[1,28],[1,22],[1,16]],
        [[1,55],[1,44],[2,17],[2,13]],
        [[1,80],[2,32],[2,24],[4,9]],
        [[1,108],[2,43],[2,15],[2,11]],
        [[2,68],[4,27],[4,19],[4,15]],
        [[2,78],[4,31],[2,14],[4,13]],
        [[2,97],[2,38],[4,18],[2,14]],
        [[2,116],[3,36],[4,16],[4,12]],
        [[2,68],[4,43],[6,19],[6,15]],
        [[4,81],[1,50],[4,22],[4,14]],
        [[2,92],[6,36],[4,20],[6,16]],
        [[4,107],[8,37],[8,20],[4,12]],
        [[3,115],[4,40],[11,16],[5,12]],
        [[5,87],[5,41],[5,24],[7,12]],
        [[5,98],[7,45],[15,19],[3,15]],
        [[1,107],[10,46],[1,22],[5,14]],
        [[5,120],[9,43],[17,22],[1,14]],
        [[3,113],[3,44],[17,21],[4,13]],
        [[3,107],[3,41],[15,24],[5,15]],
        [[4,116],[7,42],[17,22],[4,14]],
        [[2,111],[10,46],[17,21],[4,13]],
        [[4,121],[7,43],[13,24],[8,12]],
        [[4,117],[11,44],[16,22],[4,13]],
        [[6,116],[11,41],[19,22],[2,14]],
        [[8,106],[7,45],[22,21],[4,13]],
        [[10,114],[7,42],[22,22],[6,12]],
        [[8,122],[9,44],[20,22],[8,12]],
        [[3,117],[10,43],[20,24],[10,13]],
        [[7,116],[7,45],[24,22],[8,14]],
        [[5,115],[11,45],[22,24],[12,12]],
        [[13,115],[8,45],[22,24],[3,14]],
        [[17,115],[5,44],[20,24],[10,13]],
        [[17,115],[9,44],[22,24],[10,13]],
        [[13,115],[3,44],[22,24],[6,14]],
        [[12,121],[7,45],[24,24],[6,13]],
        [[6,121],[14,46],[24,24],[6,13]],
        [[17,122],[10,44],[26,24],[2,14]],
        [[4,122],[10,44],[26,24],[6,14]],
        [[20,117],[4,45],[24,24],[7,13]],
    ];

    const ECC_RS = { L:0, M:1, Q:2, H:3 };
    const MODE_NUM = 1, MODE_ALPHA = 2, MODE_BYTE = 4;

    function getMode(text) {
        if (/^\d+$/.test(text)) return MODE_NUM;
        if (/^[A-Z0-9 $%*+\-./:]+$/.test(text)) return MODE_ALPHA;
        return MODE_BYTE;
    }

    function getNumByteCount(text) {
        let len = 0;
        for (const ch of text) {
            const c = ch.charCodeAt(0);
            if (c < 0x80) len += 1;
            else if (c < 0x800) len += 2;
            else if (c < 0x10000) len += 3;
            else len += 4;
        }
        return len;
    }

    function canEncode(text, mode, ver, eccIdx) {
        const spec = ECC_SPEC[ver][eccIdx];
        const totalData = spec[0] * spec[1] + (spec[2] || 0) * (spec[3] || 0);
        const capBytes = totalData;

        // Data bits needed: mode(4) + charCount(varies) + data
        const ccBits = ver <= 9 ? [10,9,8] : ver <= 26 ? [12,11,16] : [14,13,16];
        const ccLen = ccBits[Math.log2(mode)];
        const headerBits = 4 + ccLen;

        let dataBits;
        if (mode === MODE_NUM) {
            dataBits = Math.floor(text.length / 3) * 10 + [0, 0, 4, 7][text.length % 3];
        } else if (mode === MODE_ALPHA) {
            dataBits = Math.floor(text.length / 2) * 11 + (text.length % 2 ? 6 : 0);
        } else {
            dataBits = getNumByteCount(text) * 8;
        }

        const totalBits = headerBits + dataBits;
        return Math.ceil(totalBits / 8) <= capBytes;
    }

    function chooseVersion(text, ecc) {
        const mode = getMode(text);
        const ecIdx = ECC_RS[ecc];
        for (let v = 1; v <= 40; v++)
            if (canEncode(text, mode, v, ecIdx)) return v;
        throw new Error('Text too long');
    }

    // ---- 数据编码 ----
    function encodeData(text, ver, ecc) {
        const ecIdx = ECC_RS[ecc];
        const mode = getMode(text);
        const spec = ECC_SPEC[ver][ecIdx];
        const totalData = spec[0] * spec[1] + (spec[2] || 0) * (spec[3] || 0);
        const capBits = totalData * 8;

        let bits = '';

        // Mode
        bits += mode.toString(2).padStart(4, '0');

        // Char count
        const ccBits = ver <= 9 ? [10,9,8] : ver <= 26 ? [12,11,16] : [14,13,16];
        const ccLen = ccBits[Math.log2(mode)];
        if (mode === MODE_BYTE) {
            bits += getNumByteCount(text).toString(2).padStart(ccLen, '0');
        } else {
            bits += text.length.toString(2).padStart(ccLen, '0');
        }

        // Data
        if (mode === MODE_NUM) {
            for (let i = 0; i < text.length; i += 3) {
                const chunk = text.slice(i, i + 3);
                const bitsLen = chunk.length === 3 ? 10 : chunk.length === 2 ? 7 : 4;
                bits += parseInt(chunk, 10).toString(2).padStart(bitsLen, '0');
            }
        } else if (mode === MODE_ALPHA) {
            const CHARS = '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ $%*+-./:';
            for (let i = 0; i < text.length; i += 2) {
                if (i + 1 < text.length) {
                    const v = CHARS.indexOf(text[i]) * 45 + CHARS.indexOf(text[i + 1]);
                    bits += v.toString(2).padStart(11, '0');
                } else {
                    bits += CHARS.indexOf(text[i]).toString(2).padStart(6, '0');
                }
            }
        } else {
            for (const ch of text) {
                const c = ch.charCodeAt(0);
                if (c < 0x80) bits += c.toString(2).padStart(8, '0');
                else if (c < 0x800) {
                    bits += (0xC0 | c >> 6).toString(2).padStart(8, '0');
                    bits += (0x80 | c & 0x3F).toString(2).padStart(8, '0');
                } else if (c < 0x10000) {
                    bits += (0xE0 | c >> 12).toString(2).padStart(8, '0');
                    bits += (0x80 | c >> 6 & 0x3F).toString(2).padStart(8, '0');
                    bits += (0x80 | c & 0x3F).toString(2).padStart(8, '0');
                } else {
                    bits += (0xF0 | c >> 18).toString(2).padStart(8, '0');
                    bits += (0x80 | c >> 12 & 0x3F).toString(2).padStart(8, '0');
                    bits += (0x80 | c >> 6 & 0x3F).toString(2).padStart(8, '0');
                    bits += (0x80 | c & 0x3F).toString(2).padStart(8, '0');
                }
            }
        }

        // Terminator
        bits += '0'.repeat(Math.min(4, capBits - bits.length));
        while (bits.length % 8) bits += '0';
        const padBytes = [0xEC, 0x11];
        for (let i = 0; bits.length < capBits; i++)
            bits += padBytes[i & 1].toString(2).padStart(8, '0');

        const bytes = new Uint8Array(bits.length / 8);
        for (let i = 0; i < bytes.length; i++)
            bytes[i] = parseInt(bits.slice(i * 8, i * 8 + 8), 2);
        return bytes;
    }

    // ---- 交错 RS 编码 ----
    function interleaveEC(data, ver, ecc) {
        const ecIdx = ECC_RS[ecc];
        const spec = ECC_SPEC[ver][ecIdx];
        // EC codewords per block = total - data per block.
        // Block group 1: total1 = spec[1], ecPer = (total1 - data1) for that group
        // But within a version, all blocks share the same EC count.
        // We compute it from the first block group: total codewords per block minus data codewords.
        // The actual EC count varies by version: [7,10,13,17],[10,16,22,28],[15,26,18,22], etc.
        // Use pre-computed table indexed by (ecIdx, ver)
        const ecPer = [
            [7,10,15,20,26,18,20,24,30,18,20,24,26,30,22,24,24,28,30,28,28,28,28,28,28,28,28,28,28,28,28,28,28,28,28,28,28,28,28,28],
            [10,16,26,18,24,16,18,22,22,26,30,28,28,28,28,28,28,28,28,26,26,26,26,26,28,28,28,28,28,28,28,28,28,28,28,28,28,28,28,28],
            [13,22,18,26,18,24,18,22,20,30,28,26,26,28,30,28,28,30,28,30,30,30,30,30,30,30,30,30,30,30,30,30,30,30,30,30,30,30,30,30],
            [17,28,22,16,22,28,26,24,28,24,24,28,26,24,28,30,28,28,30,30,30,30,30,30,30,30,30,30,30,30,30,30,30,30,30,30,30,30,30,30],
        ];
        const ecPerBlock = ecPer[ecIdx][ver - 1];
        const n1 = spec[0], d1 = spec[1], n2 = spec[2] || 0, d2 = spec[3] || 0;

        const blocks = [];
        let off = 0;
        for (let i = 0; i < n1; i++) {
            const b = data.slice(off, off + d1);
            blocks.push({ data: b, ec: rsEncode(b, ecPerBlock) });
            off += d1;
        }
        for (let i = 0; i < n2; i++) {
            const b = data.slice(off, off + d2);
            blocks.push({ data: b, ec: rsEncode(b, ecPerBlock) });
            off += d2;
        }

        const maxData = Math.max(d1, d2 || 0);
        const res = [];
        for (let i = 0; i < maxData; i++)
            for (const b of blocks)
                if (i < b.data.length) res.push(b.data[i]);
        for (let i = 0; i < ecPerBlock; i++)
            for (const b of blocks)
                res.push(b.ec[i]);
        return new Uint8Array(res);
    }

    // ---- 矩阵构建 ----
    const ALIGN = [
        null,[],[6,18],[6,22],[6,26],[6,30],[6,34],
        [6,22,38],[6,24,42],[6,26,46],[6,28,50],[6,30,54],
        [6,32,58],[6,34,62],[6,26,46,66],[6,26,48,70],[6,26,50,74],
        [6,30,54,78],[6,30,56,82],[6,30,58,86],[6,34,62,90],
        [6,28,50,72,94],[6,26,50,74,98],[6,30,54,78,102],
        [6,28,54,80,106],[6,32,58,84,110],[6,30,58,86,114],
        [6,34,62,90,118],[6,26,50,74,98,122],[6,30,54,78,102,126],
        [6,26,52,78,104,130],[6,30,56,82,108,134],[6,34,60,86,112,138],
        [6,30,58,86,114,142],[6,34,62,90,118,146],[6,30,54,78,102,126,150],
        [6,24,50,76,102,128,154],[6,28,54,80,106,132,158],
        [6,32,58,84,110,136,162],[6,26,54,82,110,138,166],
        [6,30,58,86,114,142,170],
    ];

    const FMT = [0x77C4,0x72F3,0x7DAA,0x789D,0x662F,0x6318,0x6C41,0x6976,
                 0x5413,0x5124,0x5E7D,0x5B4A,0x45FC,0x40CB,0x4F92,0x4AA5,
                 0x355F,0x3068,0x3F31,0x3A06,0x24B0,0x2187,0x2EDE,0x2BE9,
                 0x168C,0x13BB,0x1CE2,0x19D5,0x0763,0x0254,0x0D0D,0x083A];

    function buildMatrix(data, ver, ecc) {
        const N = ver * 4 + 17;
        const m = Array.from({ length: N }, () => new Int8Array(N));
        const rsv = Array.from({ length: N }, () => new Uint8Array(N));

        const set = (r, c, v) => { if (!rsv[r][c]) { m[r][c] = v; rsv[r][c] = 1; }};
        const fillFP = (tr, tc) => {
            for (let r = -1; r <= 7; r++) for (let c = -1; c <= 7; c++) {
                const rr = tr + r, cc = tc + c;
                if (rr < 0 || rr >= N || cc < 0 || cc >= N) continue;
                const inner = r >= 2 && r <= 4 && c >= 2 && c <= 4;
                const outer = (r === 0 || r === 6) && c >= 0 && c <= 6;
                const edge = (c === 0 || c === 6) && r >= 0 && r <= 6;
                set(rr, cc, inner || outer || edge ? 1 : -1);
            }
        };

        fillFP(0, 0);
        fillFP(0, N - 7);
        fillFP(N - 7, 0);

        // Timing
        for (let i = 8; i < N - 8; i++) {
            set(6, i, i % 2 ? -1 : 1);
            set(i, 6, i % 2 ? -1 : 1);
        }

        // Dark module
        set(ver * 4 + 9, 8, 1);

        // Alignment
        const pos = ALIGN[ver] || [];
        for (const r of pos) for (const c of pos) {
            if (rsv[r][c]) continue;
            for (let dr = -2; dr <= 2; dr++) for (let dc = -2; dc <= 2; dc++)
                set(r + dr, c + dc, Math.abs(dr) === 2 || Math.abs(dc) === 2 || (dr === 0 && dc === 0) ? 1 : -1);
        }

        // Reserve format areas (row 8 and col 8 of finder patterns)
        // Horizontal: row 8, cols 0-8 (skip col 6 = timing)
        for (let c = 0; c <= 8; c++) if (c !== 6) rsv[8][c] = 1;
        // Vertical: col 8, rows 0-7
        for (let r = 0; r <= 7; r++) rsv[r][8] = 1;
        // Bottom-left: col 8, rows N-8 to N-1
        for (let r = N - 8; r < N; r++) rsv[r][8] = 1;
        // Top-right: row 8, cols N-8 to N-1
        for (let c = N - 8; c < N; c++) rsv[8][c] = 1;

        // Version info (ver >= 7)
        if (ver >= 7) {
            let d = ver;
            for (let i = 0; i < 12; i++) d = (d << 1) ^ ((d >> 11) * 0x1F25);
            const bits = (ver << 12) | d;
            for (let i = 0; i < 18; i++) {
                const v = (bits >> i) & 1 ? 1 : -1;
                const r = Math.floor(i / 3), c = i % 3;
                set(r, N - 11 + c, v);
                set(N - 11 + c, r, v);
            }
        }

        // Place data bits
        const bits = [];
        for (const b of data) for (let i = 7; i >= 0; i--) bits.push((b >> i) & 1);
        let bi = 0, up = true;
        for (let col = N - 1; col >= 0; col -= 2) {
            if (col === 6) col = 5;
            const rows = up ? Array.from({ length: N }, (_, i) => N - 1 - i) : Array.from({ length: N }, (_, i) => i);
            for (const row of rows) {
                for (let dc = 0; dc <= 1; dc++) {
                    const c = col - dc;
                    if (c < 0 || rsv[row][c]) continue;
                    m[row][c] = bi < bits.length ? (bits[bi] ? 1 : -1) : -1;
                    bi++;
                }
            }
            up = !up;
        }

        // Try masks, pick lowest penalty
        const masks = [
            (r, c) => (r + c) % 2 === 0,
            (r, c) => r % 2 === 0,
            (r, c) => c % 3 === 0,
            (r, c) => (r + c) % 3 === 0,
            (r, c) => (Math.floor(r / 2) + Math.floor(c / 3)) % 2 === 0,
            (r, c) => (r * c) % 2 + (r * c) % 3 === 0,
            (r, c) => ((r * c) % 2 + (r * c) % 3) % 2 === 0,
            (r, c) => ((r + c) % 2 + (r * c) % 3) % 2 === 0,
        ];

        function penalty(mat) {
            let p = 0;
            for (let r = 0; r < N; r++) {
                let cnt = 1;
                for (let c = 1; c < N; c++) {
                    if (mat[r][c] === mat[r][c - 1]) { cnt++; if (cnt === 5) p += 3; else if (cnt > 5) p++; }
                    else cnt = 1;
                }
            }
            for (let c = 0; c < N; c++) {
                let cnt = 1;
                for (let r = 1; r < N; r++) {
                    if (mat[r][c] === mat[r - 1][c]) { cnt++; if (cnt === 5) p += 3; else if (cnt > 5) p++; }
                    else cnt = 1;
                }
            }
            for (let r = 0; r < N - 1; r++) for (let c = 0; c < N - 1; c++) {
                const v = mat[r][c];
                if (v === mat[r][c+1] && v === mat[r+1][c] && v === mat[r+1][c+1]) p += 3;
            }
            return p;
        }

        const ecIdx = ECC_RS[ecc];
        let bestP = Infinity, best = null;
        for (let mi = 0; mi < 8; mi++) {
            const clone = m.map(row => row.slice());
            const maskFn = masks[mi];

            // Apply mask
            for (let r = 0; r < N; r++) for (let c = 0; c < N; c++)
                if (!rsv[r][c] && maskFn(r, c)) clone[r][c] *= -1;

            // Place format bits
            const fmt = FMT[ecIdx * 8 + mi];
            const coords = [
                [8,0],[8,1],[8,2],[8,3],[8,4],[8,5],
                [8,7],[8,8],
                [7,8],[5,8],[4,8],[3,8],[2,8],[1,8],[0,8]
            ];
            for (let i = 0; i < 15; i++) {
                const v = (fmt >> (14 - i)) & 1 ? 1 : -1;
                const [r, c] = coords[i];
                clone[r][c] = v;
                if (i < 8) clone[N - 1 - i][8] = v;
                else clone[8][N - 15 + i] = v;
            }

            const pt = penalty(clone);
            if (pt < bestP) { bestP = pt; best = clone; }
        }

        return { matrix: best, size: N, version: ver };
    }

    // ---- Public API ----
    function generate(text, ecc = 'M') {
        if (!text || !text.length) throw new Error('Empty text');
        const ver = chooseVersion(text, ecc);
        const data = encodeData(text, ver, ecc);
        const final = interleaveEC(data, ver, ecc);
        return buildMatrix(final, ver, ecc);
    }

    return { generate };
})();

// ---- UI ----
function generate() {
    const text = document.getElementById('content').value.trim();
    if (!text) { alert('请输入内容'); return; }

    const size = parseInt(document.getElementById('size').value);
    const ecc = document.getElementById('ecc').value;
    const fg = document.getElementById('fg').value;
    const bg = document.getElementById('bg').value;

    try {
        const qr = QR.generate(text, ecc);
        render(qr, size, fg, bg);
        document.getElementById('output').classList.add('show');
    } catch (e) {
        alert('生成失败: ' + e.message);
    }
}

function render(qr, canvasSize, fg, bg) {
    const box = document.getElementById('qrbox');
    box.innerHTML = '';

    const quiet = 4;
    const total = qr.size + quiet * 2;
    const ms = Math.floor(canvasSize / total);

    const canvas = document.createElement('canvas');
    canvas.width = ms * total;
    canvas.height = ms * total;
    const ctx = canvas.getContext('2d');

    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = fg;
    for (let r = 0; r < qr.size; r++)
        for (let c = 0; c < qr.size; c++)
            if (qr.matrix[r][c] === 1)
                ctx.fillRect((c + quiet) * ms, (r + quiet) * ms, ms, ms);

    box.appendChild(canvas);
}

function download() {
    const canvas = document.querySelector('#qrbox canvas');
    if (!canvas) { alert('请先生成二维码'); return; }

    // 2x hi-res
    const hi = document.createElement('canvas');
    hi.width = canvas.width * 2;
    hi.height = canvas.height * 2;
    const ctx = hi.getContext('2d');
    ctx.imageSmoothingEnabled = false;
    ctx.drawImage(canvas, 0, 0, hi.width, hi.height);

    const link = document.createElement('a');
    link.download = 'qrcode.png';
    link.href = hi.toDataURL('image/png');
    link.click();
}

document.getElementById('content').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); generate(); }
});
window.addEventListener('load', generate);
</script>
